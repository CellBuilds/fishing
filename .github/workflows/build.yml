name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip -q gradle-8.8-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build
        run: cd skyblock-fishing-addon && gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: skyblock-fishing
          path: skyblock-fishing-addon/build/libs/*.jar
