name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: chmod +x gradlew && ./gradlew build
      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: skyblock-fishing
          path: build/libs/*.jar
